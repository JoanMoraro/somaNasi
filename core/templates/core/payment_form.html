{% extends 'core/base.html' %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-5">
        <div class="greeting-card">
            <h4>Pay for {{ course.title }}</h4>
            <p class="text-muted">Amount: KES {{ course.price }}</p>
            <form method="post">
                {% csrf_token %}
                <label class="form-label fw-bold">M-Pesa Phone Number</label>
                <input type="text" name="phone_number" class="form-control mb-3" placeholder="2547XXXXXXXX" required>
                <button type="submit" class="btn-dark-pill">Pay with M-Pesa</button>
            </form>
        </div>
    </div>
</div>
{% endblock %}
