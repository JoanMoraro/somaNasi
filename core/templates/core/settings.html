{% extends 'core/base.html' %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-5">
        <div class="greeting-card">
            <h4>Settings</h4>
            <p class="text-muted">Change your password</p>
            <form method="post">
                {% csrf_token %}
                {{ form.as_p }}
                <button type="submit" class="btn-dark-pill mt-2">Update Password</button>
            </form>
        </div>
    </div>
</div>
{% endblock %}
