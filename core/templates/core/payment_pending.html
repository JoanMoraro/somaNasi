{% extends 'core/base.html' %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-5 text-center">
        <div class="greeting-card">
            <h4>Check your phone</h4>
            <p class="text-muted">We've sent an M-Pesa prompt to complete payment for <strong>{{ course.title }}</strong>. Enter your PIN to finish enrolling.</p>
            <a href="{% url 'course_detail' course.id %}" class="btn-dark-pill">Back to course</a>
        </div>
    </div>
</div>
{% endblock %}
