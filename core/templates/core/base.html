<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>{% block title %}somaNasi{% endblock %}</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-dark px-3">
    <a class="navbar-brand" href="{% url 'course_list' %}">somaNasi</a>
    <div class="ms-auto">
{% if user.is_authenticated %}
    <a class="btn btn-outline-light btn-sm me-2" href="{% url 'dashboard' %}">Dashboard</a>
    <a class="btn btn-outline-light btn-sm me-2" href="{% url 'logout' %}">Logout</a>
{% else %}
            <a class="btn btn-outline-light btn-sm me-2" href="{% url 'login' %}">Login</a>
            <a class="btn btn-light btn-sm" href="{% url 'signup' %}">Sign Up</a>
        {% endif %}
    </div>
</nav>

<div class="container mt-4">
    {% block content %}
    {% endblock %}
</div>

<footer class="bg-dark text-light mt-5 py-3 text-center">
    <p class="mb-0">&copy; {% now "Y" %} somaNasi. Built by Joan.</p>
</footer>

</body>
</html>
